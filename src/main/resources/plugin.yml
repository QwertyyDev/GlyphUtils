name: GlyphUtils
version: 1.0.0
main: com.qwertydev.glyphutils.GlyphUtils
api-version: 1.20
author: Qwertydev
description: A comprehensive utility plugin for text conversion and symbol copying

commands:
  utils:
    description: Open the main utility menu
    aliases: [util, glyph]
    permission: glyphutils.use
    permission-message: You do not have permission to use this command.
  glyphutils-selectcolor:
    description: Internal command for color selection

permissions:
  glyphutils.use:
      description: Allows player to use /utils command
      default: op